# Workflow for deploying staging/preview content to GitHub Pages
name: Deploy staging to Pages

on:
  # Runs on pushes to staging branch
  push:
    branches: ["staging"]
  
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment per environment
concurrency:
  group: "pages-staging"
  cancel-in-progress: true

jobs:
  # Build and deploy job
  deploy-staging:
    environment:
      name: github-pages-staging
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Generate file listing
        run: |
          chmod +x file_giver/generate_listing.sh
          ./file_giver/generate_listing.sh
      
      - name: Copy content to main directory
        run: |
          chmod +x .github/scripts/copy-dirs.sh
          ./.github/scripts/copy-dirs.sh
      
      # Add a staging banner to the main index page
      - name: Add staging banner
        run: |
          sed -i '/<body>/a \
          <div style="position:fixed;top:0;left:0;right:0;background:#ff6b00;color:white;padding:10px;text-align:center;z-index:9999;font-weight:bold;">\
          ⚠️ STAGING ENVIRONMENT - This is a preview, not production\
          </div>' main/index.html
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload main directory
          path: 'main'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
