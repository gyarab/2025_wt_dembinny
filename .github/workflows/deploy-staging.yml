# Workflow for deploying staging/preview content to GitHub Pages
name: Deploy staging to Pages

on:
  # Runs on pushes to staging branch
  push:
    branches: ["staging"]
  
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Required permissions for branch-based deployment
permissions:
  contents: write

# Allow only one concurrent deployment per environment
concurrency:
  group: "pages-staging"
  cancel-in-progress: true

jobs:
  # Build and deploy job
  deploy-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Generate file listing
        run: |
          chmod +x file_giver/generate_listing.sh
          ./file_giver/generate_listing.sh
      
      - name: Copy content to main directory
        run: |
          chmod +x .github/scripts/copy-dirs.sh
          ./.github/scripts/copy-dirs.sh
      
      # Add a staging banner to all HTML files
      - name: Add staging banner
        run: |
          chmod +x .github/scripts/add-staging-banner.sh
          ./.github/scripts/add-staging-banner.sh
      
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: main
          branch: gh-pages
          clean-exclude: pr-preview/
          force: false
